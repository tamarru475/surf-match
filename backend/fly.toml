# fly.toml - run `fly launch` once to create the app, then deployments use this file
app = "surf-match-api"
primary_region = "syd"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
